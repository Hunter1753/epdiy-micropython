name: Build Firmware

on:
  push:
    branches:
      - main  
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      single_board:
        description: 'Optional: Specify a single board to build (leave blank for all)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare_env:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Prepare (build cross-compiler and apply patches)
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          bash prepare.sh

      - name: Compress workspace into a single tarball
        run: tar -czf /tmp/workspace.tar.gz .

      - name: Upload prepared workspace
        uses: actions/upload-artifact@v4
        with:
          name: prepared-workspace-${{ github.sha }}
          path: /tmp/workspace.tar.gz
          retention-days: 1 # We only need this temporarily for the build job

  build:
    needs: prepare_env # Tells GitHub to wait for prepare_env to finish
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    strategy:
      fail-fast: false
      matrix:
        board:
          - LILYGO_T5_47
          - EPDIY_V2_V3
          - EPDIY_V4
          - EPDIY_V5
          - EPDIY_V6
          - EPDIY_V7
          - EPDIY_V7_103
          - EPDIY_V7_RAW
          - LILYGO_S3

    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-workspace-${{ github.sha }}

      - name: Extract workspace
        run: |
          tar -xzf workspace.tar.gz
          rm workspace.tar.gz # Clean up the archive to save disk space

      - name: Build firmware (${{ matrix.board }})
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          bash build.sh ${{ matrix.board }}

      - name: Upload firmware artifacts (${{ matrix.board }})
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.board }}-${{ github.sha }}
          path: |
            build/${{ matrix.board }}/micropython.bin
            build/${{ matrix.board }}/bootloader/bootloader.bin
            build/${{ matrix.board }}/partition_table/partition-table.bin
          if-no-files-found: error

  # --- RELEASE JOB REMAINS UNCHANGED ---
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: firmware-*-${{ github.sha }}
          path: build-artifacts/
          merge-multiple: false

      - name: Rename artifacts to include board name
        run: |
          for dir in build-artifacts/firmware-*-${{ github.sha }}; do
            board=$(echo "$dir" | sed 's|build-artifacts/firmware-||; s|-${{ github.sha }}||')
            [ -f "$dir/micropython.bin" ] && mv "$dir/micropython.bin" "build-artifacts/${board}-micropython.bin"
            [ -f "$dir/bootloader/bootloader.bin" ] && mv "$dir/bootloader/bootloader.bin" "build-artifacts/${board}-bootloader.bin"
            [ -f "$dir/partition_table/partition-table.bin" ] && mv "$dir/partition_table/partition-table.bin" "build-artifacts/${board}-partition-table.bin"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build-artifacts/*-micropython.bin
            build-artifacts/*-bootloader.bin
            build-artifacts/*-partition-table.bin
          generate_release_notes: true
