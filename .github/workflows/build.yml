name: Build Firmware

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for changes since last successful build
        id: check
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          LAST_TAG=$(git tag --sort=-creatordate | head -n1)
          if git log ${LAST_TAG}..HEAD --oneline 2>/dev/null | grep -q .; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare (build cross-compiler and apply patches)
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          bash prepare.sh

      - name: Build firmware
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          bash build.sh

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            build/micropython.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: build-artifacts/ # Downloads the files into this folder

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build-artifacts/micropython.bin
            build-artifacts/bootloader/bootloader.bin
            build-artifacts/partition_table/partition-table.bin
          generate_release_notes: true
